<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quant Drive — Placement Aptitude Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c1420;
    --bg-2:#101c2c;
    --surface:#152239;
    --surface-2:#1b2c47;
    --line:#2a3c5a;
    --gold:#f2b705;
    --gold-dim:#8a6a1a;
    --teal:#2dd4bf;
    --red:#f87171;
    --text:#e7ecf5;
    --text-dim:#8fa0bd;
    --text-faint:#5b6b88;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1100px 600px at 85% -10%, rgba(242,183,5,0.08), transparent 60%),
      radial-gradient(900px 500px at -10% 100%, rgba(45,212,191,0.06), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--gold);color:#0c1420;}

  /* ---------- Perforated header ---------- */
  .topbar{
    position:sticky;top:0;z-index:40;
    background:rgba(12,20,32,0.88);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .topbar-inner{
    max-width:960px;margin:0 auto;padding:16px 20px;
    display:flex;align-items:center;justify-content:space-between;gap:16px;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-badge{
    width:40px;height:40px;border-radius:9px;
    background:linear-gradient(145deg,var(--gold),#c98f04);
    display:flex;align-items:center;justify-content:center;
    font-family:'Sora',sans-serif;font-weight:800;color:#0c1420;font-size:16px;
    box-shadow:0 4px 14px rgba(242,183,5,0.25);
    flex-shrink:0;
  }
  .brand-text h1{font-family:'Sora',sans-serif;font-size:16px;margin:0;letter-spacing:0.2px;}
  .brand-text p{margin:0;font-size:11.5px;color:var(--text-dim);letter-spacing:0.4px;text-transform:uppercase;}
  .score-chip{
    display:flex;align-items:center;gap:10px;
    background:var(--surface);border:1px solid var(--line);
    padding:8px 14px;border-radius:100px;
    font-family:'JetBrains Mono',monospace;font-size:13px;
    white-space:nowrap;
  }
  .score-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);}
  .score-chip b{color:var(--gold);}

  /* ---------- Layout ---------- */
  .wrap{max-width:960px;margin:0 auto;padding:28px 20px 80px;}

  /* Topic rail */
  .rail{
    display:flex;gap:8px;overflow-x:auto;padding-bottom:14px;margin-bottom:22px;
    scrollbar-width:none;
  }
  .rail::-webkit-scrollbar{display:none;}
  .rail-chip{
    flex-shrink:0;
    padding:9px 16px;border-radius:100px;
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--text-dim);
    font-size:13px;font-weight:500;
    cursor:pointer;
    transition:all .18s ease;
    white-space:nowrap;
    display:flex;align-items:center;gap:7px;
  }
  .rail-chip .n{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;
    background:rgba(255,255,255,0.06);padding:1px 6px;border-radius:5px;
  }
  .rail-chip:hover{border-color:var(--gold-dim);color:var(--text);}
  .rail-chip.active{
    background:var(--gold);color:#0c1420;border-color:var(--gold);font-weight:600;
  }
  .rail-chip.active .n{background:rgba(0,0,0,0.15);color:#0c1420;}
  .rail-chip.done{border-color:rgba(45,212,191,0.4);}
  .rail-chip.done:not(.active)::after{content:'✓';color:var(--teal);margin-left:2px;font-size:11px;}

  /* Progress dots for current topic */
  .progress-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .progress-label{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.6px;}
  .dots{display:flex;gap:6px;}
  .pdot{width:7px;height:7px;border-radius:50%;background:var(--line);transition:all .2s;}
  .pdot.current{background:var(--gold);width:18px;border-radius:4px;}
  .pdot.answered-correct{background:var(--teal);}
  .pdot.answered-wrong{background:var(--red);}

  /* ---------- The Card (ticket) ---------- */
  .ticket{
    position:relative;
    background:linear-gradient(180deg,var(--surface),var(--bg-2));
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:26px 26px 22px;
    box-shadow:0 20px 50px -20px rgba(0,0,0,0.6);
    overflow:visible;
    animation:cardIn .35s ease;
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  .ticket-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:18px;}
  .qmeta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .tag{
    font-size:11px;font-weight:600;letter-spacing:0.4px;text-transform:uppercase;
    padding:4px 10px;border-radius:6px;
  }
  .tag-topic{background:rgba(255,255,255,0.05);color:var(--text-dim);border:1px solid var(--line);}
  .tag-diff-easy{background:rgba(45,212,191,0.12);color:var(--teal);}
  .tag-diff-medium{background:rgba(242,183,5,0.14);color:var(--gold);}
  .tag-diff-hard{background:rgba(248,113,113,0.14);color:var(--red);}
  .qid{
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-faint);
    flex-shrink:0;
  }

  .companies{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
  .co-chip{
    font-size:11px;color:var(--text-dim);
    border:1px dashed var(--line);
    padding:3px 9px;border-radius:100px;
  }

  .qtext{
    font-family:'Sora',sans-serif;font-weight:600;font-size:19px;line-height:1.5;
    margin:0 0 24px;color:var(--text);
  }

  .options{display:grid;gap:10px;margin-bottom:6px;}
  .opt{
    text-align:left;
    background:var(--surface-2);
    border:1px solid var(--line);
    color:var(--text);
    padding:14px 16px;border-radius:10px;
    font-family:'Inter',sans-serif;font-size:14.5px;font-weight:500;
    cursor:pointer;
    display:flex;align-items:center;gap:12px;
    transition:border-color .15s, background .15s, transform .1s;
  }
  .opt:hover:not(:disabled){border-color:var(--gold-dim);transform:translateY(-1px);}
  .opt:disabled{cursor:default;}
  .opt .letter{
    width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.05);
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);
    flex-shrink:0;
  }
  .opt.selected{border-color:var(--gold);}
  .opt.correct-reveal{
    border-color:var(--teal);background:rgba(45,212,191,0.08);
  }
  .opt.correct-reveal .letter{background:var(--teal);color:#0c1420;}
  .opt.wrong-reveal{
    border-color:var(--red);background:rgba(248,113,113,0.08);
  }
  .opt.wrong-reveal .letter{background:var(--red);color:#0c1420;}
  .opt.dim{opacity:0.45;}

  /* Stamp */
  .stamp{
    position:absolute;top:14px;right:20px;
    font-family:'Sora',sans-serif;font-weight:800;font-size:13px;letter-spacing:1.5px;
    padding:7px 14px;border-radius:6px;
    transform:rotate(6deg) scale(0.6);
    opacity:0;
    pointer-events:none;
    border:2.5px solid currentColor;
    text-transform:uppercase;
  }
  .stamp.show{
    animation:stampIn .4s cubic-bezier(.2,1.4,.4,1) forwards;
  }
  @keyframes stampIn{
    0%{opacity:0;transform:rotate(6deg) scale(0.5);}
    60%{opacity:1;transform:rotate(-3deg) scale(1.12);}
    100%{opacity:1;transform:rotate(-4deg) scale(1);}
  }
  .stamp.correct{color:var(--teal);}
  .stamp.wrong{color:var(--red);}

  /* Explanation panel */
  .explain{
    max-height:0;overflow:hidden;
    transition:max-height .45s ease;
  }
  .explain.open{max-height:2200px;}
  .explain-inner{
    margin-top:20px;padding-top:20px;border-top:1px dashed var(--line);
    display:grid;gap:16px;
  }
  .eblock h4{
    margin:0 0 6px;font-size:11px;text-transform:uppercase;letter-spacing:0.7px;
    color:var(--gold);font-weight:700;
  }
  .eblock p, .eblock li{margin:0;font-size:14px;line-height:1.55;color:var(--text);}
  .eblock ol{margin:0;padding-left:18px;}
  .eblock ol li{margin-bottom:4px;color:var(--text-dim);}
  .badgegrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:520px){.badgegrid{grid-template-columns:1fr;}}
  .mistake-box{
    background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.2);
    border-radius:10px;padding:12px 14px;
  }
  .mistake-box h4{color:var(--red);}
  .tip-box{
    background:rgba(242,183,5,0.06);border:1px solid rgba(242,183,5,0.2);
    border-radius:10px;padding:12px 14px;
  }
  .practice-box{
    background:rgba(45,212,191,0.06);border:1px solid rgba(45,212,191,0.2);
    border-radius:10px;padding:12px 14px;
  }
  .practice-box h4{color:var(--teal);}

  .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:22px;gap:12px;}
  .btn{
    font-family:'Sora',sans-serif;font-weight:600;font-size:14px;
    padding:11px 20px;border-radius:9px;border:1px solid var(--line);
    background:var(--surface-2);color:var(--text);cursor:pointer;
    transition:all .15s;
  }
  .btn:hover{border-color:var(--gold-dim);}
  .btn.primary{
    background:var(--gold);color:#0c1420;border-color:var(--gold);
  }
  .btn.primary:hover{background:#ffcc2e;}
  .btn:disabled{opacity:0.35;cursor:not-allowed;}
  .btn-ghost{background:transparent;border-color:transparent;color:var(--text-faint);font-size:13px;}

  /* Completion screen */
  .done-screen{text-align:center;padding:60px 20px;}
  .done-screen .big{font-family:'Sora',sans-serif;font-size:44px;font-weight:800;color:var(--gold);margin-bottom:6px;}
  .done-screen p{color:var(--text-dim);}

  footer{
    text-align:center;color:var(--text-faint);font-size:12px;padding:20px;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-badge">Q</div>
      <div class="brand-text">
        <h1>Quant Drive</h1>

      </div>

  <div id="cardHost"></div>
</div>

;

// group by topic, preserving first-seen order, ordered by chapter then appearance
const topics = [];
const byTopic = {};
QUESTIONS.forEach(q=>{
  const key = q.chapter + '||' + q.topic;
  if(!byTopic[key]){ byTopic[key] = []; topics.push(key); }
  byTopic[key].push(q);
});

const STORAGE_KEY = 'quantDriveProgress';

function saveProgress(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      currentTopicKey, currentIndex, answered, totalAnswered, totalCorrect
    }));
  }catch(e){ /* storage unavailable — fail silently */ }
}

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    const data = JSON.parse(raw);
    if(!data || !topics.includes(data.currentTopicKey)) return null;
    return data;
  }catch(e){ return null; }
}

const saved = loadProgress();

let currentTopicKey = saved ? saved.currentTopicKey : topics[0];
let currentIndex = saved ? saved.currentIndex : 0;
let answered = saved ? saved.answered : {}; // qid -> {selectedIdx, correct}
let totalAnswered = saved ? saved.totalAnswered : 0;
let totalCorrect = saved ? saved.totalCorrect : 0;

function topicLabel(key){
  const q = byTopic[key][0];
  return q.topic.replace(/^\d+\.\s*/,'');
}

function renderRail(){
  const rail = document.getElementById('topicRail');
  rail.innerHTML = '';
  topics.forEach(key=>{
    const qs = byTopic[key];
    const answeredCount = qs.filter(q=>answered[q.id]).length;
    const chip = document.createElement('div');
    chip.className = 'rail-chip' + (key===currentTopicKey?' active':'') + (answeredCount===qs.length?' done':'');
    chip.innerHTML = `${topicLabel(key)} <span class="n">${answeredCount}/${qs.length}</span>`;
    chip.onclick = ()=>{ currentTopicKey = key; currentIndex = 0; renderAll(); };
    rail.appendChild(chip);
  });
}

function renderDots(){
  const row = document.getElementById('dotsRow');
  row.innerHTML = '';
  const qs = byTopic[currentTopicKey];
  qs.forEach((q,i)=>{
    const d = document.createElement('div');
    let cls = 'pdot';
    if(i===currentIndex) cls += ' current';
    else if(answered[q.id]) cls += answered[q.id].correct ? ' answered-correct' : ' answered-wrong';
    d.className = cls;
    row.appendChild(d);
  });
  document.getElementById('progressLabel').textContent = `Question ${currentIndex+1} of ${qs.length} — ${topicLabel(currentTopicKey)}`;
}

function updateScore(){
  document.getElementById('scoreVal').textContent = `${totalCorrect}/${totalAnswered}`;
}

const letters = ['A','B','C','D'];

function diffClass(diff){
  const d = (diff||'').toLowerCase();
  if(d.includes('hard')) return 'tag-diff-hard';
  if(d.includes('medium')) return 'tag-diff-medium';
  return 'tag-diff-easy';
}

function renderCard(){
  const qs = byTopic[currentTopicKey];
  const q = qs[currentIndex];
  const state = answered[q.id];
  const host = document.getElementById('cardHost');

  const companiesHtml = q.companies.map(c=>`<span class="co-chip">${c}</span>`).join('');

  let optionsHtml = '';
  q.options.forEach((opt, i)=>{
    let cls = 'opt';
    if(state){
      if(i === q.correctIndex) cls += ' correct-reveal';
      else if(i === state.selectedIdx) cls += ' wrong-reveal';
      else cls += ' dim';
    }
    optionsHtml += `<button class="${cls}" data-idx="${i}" ${state?'disabled':''}>
      <span class="letter">${letters[i]}</span><span>${opt}</span>
    </button>`;
  });

  let stampHtml = '';
  if(state){
    stampHtml = `<div class="stamp show ${state.correct?'correct':'wrong'}">${state.correct?'Correct':'Try Again'}</div>`;
  }

  let explainHtml = '';
  if(state){
    const stepsHtml = q.steps.length ? `<div class="eblock"><h4>Step-by-step</h4><ol>${q.steps.map(s=>`<li>${s}</li>`).join('')}</ol></div>` : '';
    explainHtml = `
      <div class="explain open">
        <div class="explain-inner">
          <div class="badgegrid">
            <div class="eblock"><h4>Formula used</h4><p>${q.formula||'—'}</p></div>
            <div class="eblock"><h4>Shortcut</h4><p>${q.shortcut||'—'}</p></div>
          </div>
          ${stepsHtml}
          <div class="mistake-box"><h4>Common mistake</h4><p>${q.mistake||'—'}</p></div>
          <div class="tip-box"><h4>Interview tip</h4><p>${q.tip||'—'}</p></div>
          ${q.practice? `<div class="practice-box"><h4>Try next</h4><p>${q.practice}</p></div>` : ''}
        </div>
      </div>`;
  } else {
    explainHtml = `<div class="explain"></div>`;
  }

  const isLastInTopic = currentIndex === qs.length-1;
  const lastTopic = currentTopicKey === topics[topics.length-1];

  host.innerHTML = `
    <div class="ticket">
      ${stampHtml}
      <div class="ticket-top">
        <div class="qmeta">
          <span class="tag tag-topic">${topicLabel(currentTopicKey)}</span>
          <span class="tag ${diffClass(q.difficulty)}">${q.difficulty||'—'}</span>
        </div>
        <span class="qid">#${String(q.id).padStart(2,'0')}</span>
      </div>
      <div class="companies">${companiesHtml}</div>
      <p class="qtext">${q.question}</p>
      <div class="options">${optionsHtml}</div>
      ${explainHtml}
      <div class="nav-row">
        <button class="btn btn-ghost" id="skipBtn" ${state?'style="visibility:hidden"':''}>Skip for now</button>
        <button class="btn primary" id="nextBtn" ${state?'':'disabled'}>
          ${isLastInTopic ? (lastTopic ? 'Finish' : 'Next topic →') : 'Next question →'}
        </button>
      </div>
    </div>
  `;

  host.querySelectorAll('.opt').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(answered[q.id]) return;
      const idx = parseInt(btn.dataset.idx,10);
      const correct = idx === q.correctIndex;
      answered[q.id] = {selectedIdx: idx, correct};
      totalAnswered++;
      if(correct) totalCorrect++;
      updateScore();
      saveProgress();
      renderAll();
    });
  });

  const nextBtn = document.getElementById('nextBtn');
  if(nextBtn){
    nextBtn.addEventListener('click', ()=>{
      goNext();
    });
  }
  const skipBtn = document.getElementById('skipBtn');
  if(skipBtn){
    skipBtn.addEventListener('click', ()=>{ goNext(); });
  }
}

function goNext(){
  const qs = byTopic[currentTopicKey];
  if(currentIndex < qs.length-1){
    currentIndex++;
  } else {
    const ti = topics.indexOf(currentTopicKey);
    if(ti < topics.length-1){
      currentTopicKey = topics[ti+1];
      currentIndex = 0;
    } else {
      renderCompletion();
      renderRail();
      saveProgress();
      return;
    }
  }
  saveProgress();
  renderAll();
}

function renderCompletion(){
  const host = document.getElementById('cardHost');
  document.getElementById('dotsRow').innerHTML='';
  document.getElementById('progressLabel').textContent = 'All chapters complete';
  host.innerHTML = `
    <div class="ticket done-screen">
      <div class="big">${totalCorrect}/${totalAnswered}</div>
      <p>Questions answered correctly across all 4 chapters.</p>
      <div class="nav-row" style="justify-content:center;margin-top:20px;">
        <button class="btn primary" id="restartBtn">Restart from Chapter 1</button>
      </div>
    </div>
  `;
  document.getElementById('restartBtn').onclick = ()=>{
    answered = {}; totalAnswered = 0; totalCorrect = 0;
    currentTopicKey = topics[0]; currentIndex = 0;
    updateScore();
    saveProgress();
    renderAll();
  };
}

function renderAll(){
  renderRail();
  renderDots();
  renderCard();
}

updateScore();
renderAll();
</script>
</body>
</html>
